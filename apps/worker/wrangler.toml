name = "fitbit-vital-monitor"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Cron schedules. The post-wake job uses UTC so the crontab must be shifted for your
# USER_TIMEZONE: "0 23 * * *" fires 23:00 UTC = 08:00 JST. Edit if you change the timezone.
[triggers]
crons = [
  "*/15 * * * *", # High-frequency: heart rate / activity / AZM
  "0 * * * *",    # Hourly: breathing rate / SpO2 / device info
  "0 23 * * *",   # Post-wake: sleep / HRV / skin temp / cardio score / resting HR (08:00 JST)
  "0 */4 * * *",  # Body: weight / body composition (also handles R2 archive sweep)
]

[vars]
USER_TIMEZONE = "Asia/Tokyo"

[[d1_databases]]
binding = "DB"
database_name = "fitbit_vital_monitor"
database_id = "da06585e-d2c6-42ee-b2cc-4e2f125be900"
migrations_dir = "../../migrations"

[[durable_objects.bindings]]
name = "TOKEN_STORE"
class_name = "TokenStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TokenStore"]

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "fitbit-vital-monitor-archive"

[assets]
directory = "../gui/dist"

[observability]
enabled = true
