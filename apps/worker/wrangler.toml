name = "fitbit-vital-monitor"
main = "src/index.ts"
compatibility_date = "2024-12-18"
compatibility_flags = ["nodejs_compat"]

# Cron schedules. Primary ingestion is Fitbit Subscription webhooks (see
# DESIGN.md §4.4); cron remains for what webhooks cannot cover.
# The daily-fallback job uses UTC, so the crontab must be shifted for your
# USER_TIMEZONE: "0 23 * * *" fires 23:00 UTC = 08:00 JST. Edit if you change
# the timezone.
[triggers]
crons = [
  "*/15 * * * *", # High-frequency: heart rate intraday (no Subscription coverage)
  "0 * * * *",    # Hourly: device info (no Subscription coverage)
  "0 23 * * *",   # Daily fallback: webhook miss recovery for sleep/wake-up/activity/body (08:00 JST)
  "0 */4 * * *",  # Body cron: R2 archive sweep only (weight is now webhook-driven)
]

[vars]
USER_TIMEZONE = "Asia/Tokyo"

[[d1_databases]]
binding = "DB"
database_name = "fitbit_vital_monitor"
database_id = "da06585e-d2c6-42ee-b2cc-4e2f125be900"
migrations_dir = "../../migrations"

[[durable_objects.bindings]]
name = "TOKEN_STORE"
class_name = "TokenStore"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TokenStore"]

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "fitbit-vital-monitor-archive"

[assets]
directory = "../gui/dist"

[observability]
enabled = true
